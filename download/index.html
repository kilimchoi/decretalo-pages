<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Descargar app iOS | Decrétalo</title>
    <meta name="description" content="Descarga Decrétalo para iPhone desde la App Store.">
    <link rel="icon" href="../assets/decretalo-logo.png">
    <link rel="stylesheet" href="../assets/styles.css?v=app-store-badge">
  </head>
  <body>
    <a class="skip-link" href="#main">Saltar al contenido</a>
    <header class="site-header">
      <nav class="nav" aria-label="Navegación principal">
        <a class="brand" href="../" aria-label="Inicio de Decrétalo">
          <img class="brand-logo" src="../assets/decretalo-logo.png" width="40" height="40" alt="" aria-hidden="true">
          <span>Decrétalo</span>
        </a>
        <div class="nav-links">
          <a aria-current="page" href="./">Descargar</a>
          <a href="../privacy/">Privacidad</a>
          <a href="../terms/">Términos</a>
          <a href="../support/">Soporte</a>
        </div>
      </nav>
    </header>

    <aside class="tiktok-browser-hint" hidden data-tiktok-browser-hint aria-live="polite">
      <svg class="tiktok-hint-arrow" viewBox="0 0 92 78" aria-hidden="true" focusable="false">
        <path d="M9 68C26 39 49 18 82 10"></path>
        <path d="M67 7 83 9 80 25"></path>
      </svg>
      <ol>
        <li>Toca los 3 puntos</li>
        <li>Selecciona <strong>Abrir en navegador</strong></li>
      </ol>
    </aside>

    <main id="main" class="download-shell minimal-download-shell">
      <section class="download-panel download-card" aria-label="Descarga de Decrétalo">
        <div class="download-card-brand">
          <img class="download-card-logo" src="../assets/decretalo-logo.png" width="88" height="88" alt="" aria-hidden="true">
          <p>App oficial</p>
          <h1>Decrétalo</h1>
        </div>

        <a class="download-button" href="https://apps.apple.com/mx/app/decr%C3%A9talo/id6776760425">
          <span class="download-button-icon" aria-hidden="true">
            <svg viewBox="0 0 56 68" focusable="false">
              <path d="M45.5 36.1c-.1-8.1 6.7-12 7-12.2-3.8-5.6-9.7-6.4-11.8-6.5-5-.5-9.8 3-12.4 3-2.6 0-6.6-2.9-10.8-2.8-5.6.1-10.7 3.2-13.6 8.2-5.8 10.1-1.5 25 4.2 33.2 2.8 4 6.1 8.5 10.5 8.3 4.2-.2 5.8-2.7 10.9-2.7 5 0 6.5 2.7 10.9 2.6 4.5-.1 7.4-4.1 10.1-8.1 3.2-4.7 4.5-9.2 4.6-9.4-.1-.1-8.8-3.4-8.9-13.6ZM37.5 12.1c2.3-2.8 3.8-6.6 3.4-10.5-3.3.1-7.2 2.2-9.5 4.9-2.1 2.4-4 6.4-3.5 10.2 3.7.3 7.3-1.8 9.6-4.6Z"></path>
            </svg>
          </span>
          <span class="download-button-copy">
            <span>Descárgalo en el</span>
            <strong>App Store</strong>
          </span>
        </a>
      </section>
    </main>

    <script>
      (() => {
        const browserHint = document.querySelector("[data-tiktok-browser-hint]");
        if (!browserHint) {
          return;
        }

        const userAgent = navigator.userAgent || "";
        const isIOS =
          /iPad|iPhone|iPod/.test(userAgent) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        const isTikTokWebView =
          /TikTok|BytedanceWebview|ByteLocale|Musical_ly|musically|Aweme/i.test(userAgent);
        const forceTikTokInstructions = new URLSearchParams(window.location.search).has("tiktok");
        const shouldShowTikTokInstructions = forceTikTokInstructions || (isIOS && isTikTokWebView);

        if (shouldShowTikTokInstructions) {
          document.body.classList.add("tiktok-webview-mode");
          browserHint.hidden = false;
        }
      })();
    </script>
  </body>
</html>
